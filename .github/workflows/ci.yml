# CI cho EC-VoucherHub — monorepo npm workspaces (shared + backend + frontend).
# Stack: TypeScript/Node, Express, Prisma, React + Vite, Vitest + fast-check.
# Các lệnh dưới đây bám theo scripts trong package.json (gốc + từng workspace).
# Một số script (lint/test) hiện chưa được khai báo nên dùng `--if-present`
# để CI không vỡ ở giai đoạn scaffold; chúng sẽ tự chạy khi script được thêm.

name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

# Hủy các lần chạy cũ trên cùng một nhánh/PR khi có commit mới.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma chưa có schema ở giai đoạn scaffold → chỉ generate khi đã có schema,
      # tránh CI đỏ trước khi Task 2.1 (Prisma schema) hoàn thành.
      - name: Prisma generate (nếu đã có schema)
        run: |
          if [ -f backend/prisma/schema.prisma ]; then
            npm run db:generate
          else
            echo "Chưa có backend/prisma/schema.prisma — bỏ qua prisma generate."
          fi

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/**"
          if-no-files-found: ignore
